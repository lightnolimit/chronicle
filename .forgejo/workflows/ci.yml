name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, development, staging]
  pull_request:
    branches: [main, development, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forgejo-parity:
    name: Forgejo Parity
    runs-on: ubuntu-latest
    container:
      options: --network host
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install --workspace=agent
      - run: npm run format:check --workspace=agent
      - run: npm run test --workspace=agent
      - run: test -f .forgejo/workflows/ci.yml